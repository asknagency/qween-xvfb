[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
loglevel=info

; ── Static file server (QweenRender.html + project ZIPs) ─────────────────────
[program:static-server]
command=node /app/apps/app/server.js
directory=/app
environment=PORT=3001
stdout_logfile=/var/log/static-server.log
stderr_logfile=/var/log/static-server-err.log
autorestart=true
startretries=3

; ── FastAPI render API ────────────────────────────────────────────────────────
[program:api]
command=uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
environment=RENDERER_URL=http://localhost:3001,MAX_CONCURRENT_RENDERS=%(ENV_MAX_CONCURRENT_RENDERS)s
stdout_logfile=/var/log/api.log
stderr_logfile=/var/log/api-err.log
autorestart=true
startretries=3
; Wait for static server to be up before starting
startsecs=3
