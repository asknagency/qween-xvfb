<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QweenRender</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MotionPathPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/MorphSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/TextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrambleTextPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Physics2DPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/EasePack.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }

  /* ── Stage ─────────────────────────────────────────────── */
  #stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* The aspect-ratio frame that holds all nodes */
  #frame {
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Each node layer */
  .qw-node {
    position: absolute; inset: 0;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .qw-node svg {
    width: 100%; height: 100%;
    overflow: hidden;
    shape-rendering: geometricPrecision;
    text-rendering: geometricPrecision;
  }

  .qw-node video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: transparent;
  }

  /* ── Status overlay ─────────────────────────────────────── */
  #status {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    z-index: 9999;
    gap: 16px;
    transition: opacity 0.4s ease;
  }
  #status.hidden { opacity: 0; pointer-events: none; }

  #status-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(64,158,255,.15);
    border: 1px solid rgba(64,158,255,.3);
    display: flex; align-items: center; justify-content: center;
    color: #409EFF;
  }

  #status-text { color: #888; font-size: 13px; max-width: 340px; text-align: center; line-height: 1.5; }
  #status-error { color: #f56c6c; font-size: 13px; max-width: 380px; text-align: center; line-height: 1.5; background: rgba(245,108,108,.08); border: 1px solid rgba(245,108,108,.25); border-radius: 6px; padding: 10px 14px; display: none; }

  /* spinner */
  @keyframes qw-spin { to { transform: rotate(360deg); } }
  .qw-spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(64,158,255,.2);
    border-top-color: #409EFF;
    border-radius: 50%;
    animation: qw-spin .7s linear infinite;
  }
</style>
</head>
<body>

<!-- ── Status / loading overlay ─────────────────────────── -->
<div id="status">
  <div id="status-icon">
    <div class="qw-spinner"></div>
  </div>
  <div id="status-text">Loading project…</div>
  <div id="status-error"></div>
</div>

<!-- ── Main render stage ─────────────────────────────────── -->
<div id="stage">
  <div id="frame"></div>
</div>

<script>
'use strict';

// GSAP setup — identical to QweenApp

gsap.registerPlugin(DrawSVGPlugin, MotionPathPlugin, MorphSVGPlugin, TextPlugin, ScrambleTextPlugin, Physics2DPlugin, EasePack);

// ─────────────────────────────────────────────────────────────
// Helpers — verbatim from QweenApp

  if (mode==='currency') { if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(1)+'k'; }
  else if (mode==='filesize') { if(v>=1073741824) return (v/1073741824).toFixed(2)+' GB'; if(v>=1048576) return (v/1048576).toFixed(1)+' MB'; if(v>=1024) return (v/1024).toFixed(0)+' KB'; }

};

// ─────────────────────────────────────────────────────────────
// Proxy helper for expression evaluation
// ─────────────────────────────────────────────────────────────
const AnimationProxy = {
  createProxy(el) {
    let bbox = { x:0, y:0, width:0, height:0 };
    try { bbox = el.getBBox ? el.getBBox() : bbox; } catch(e){}
    return { x:bbox.x, y:bbox.y, w:bbox.width, h:bbox.height, cx:bbox.x+bbox.width/2, cy:bbox.y+bbox.height/2 };
  }
};

// ─────────────────────────────────────────────────────────────
// AnimationEngine — extracted from QweenApp, self-contained
// ─────────────────────────────────────────────────────────────
// AnimationEngine — extracted from QweenApp v222, self-contained
// ─────────────────────────────────────────────────────────────

// getEffectiveTimeScale — used by the video play tween inside buildTimeline
const getEffectiveTimeScale = (tl) => {
  let rate = 1, node = tl;
  while (node) { rate *= node.timeScale(); node = node.parent; }
  return Math.min(16, Math.max(0.0625, rate || 1));
};

// ElMessage stub — QweenRender has no UI toasts; route to console instead
const ElMessage = {
  warning: (msg) => console.warn('[QweenRender]', msg),
  error:   (msg) => console.error('[QweenRender]', msg),
  success: (msg) => console.log('[QweenRender]', msg),
};

const AnimationEngine = {
createProxy: (el) => {
let b = { x: 0, y: 0, width: 0, height: 0 }; try { b = el.getBBox(); } catch (e) { }
return { x: b.x, y: b.y, w: b.width, h: b.height, cx: b.x + b.width / 2, cy: b.y + b.height / 2, dom: el };
},
generateGsapVars: (currentTween, activeProps, expressionFlags, plugins, activeAttrs, attrValues, useGSAPColors, localFonts) => {

}
});
const textProps = ['fontSize', 'letterSpacing', 'lineHeight', 'wordSpacing'];
textProps.forEach(k => {
if (activeProps[k] && currentTween.vars[k] !== null && currentTween.vars[k] !== "") {
if (expressionFlags[k]) { const expr = currentTween.vars[k]; if (isSafeExpression(expr)) vars[k] = { _isExpr: true, val: expr }; else { vars[k] = 0; _blockedExprs.push(k); } }
else { vars[k] = currentTween.vars[k]; }
}
});

const htmlColorProps = ['color', 'backgroundColor'];
htmlColorProps.forEach(k => {

  else { vars[k] = currentTween.vars[k]; }
}
});

htmlStringProps.forEach(k => { if (activeProps[k] && currentTween.vars[k] !== null && currentTween.vars[k] !== '') vars[k] = currentTween.vars[k]; });

htmlPosProps.forEach(k => { if (activeProps[k] && currentTween.vars[k] !== null && currentTween.vars[k] !== '') vars[k] = currentTween.vars[k]; });

vars.fontFamily = plugins.typography.fontFamily;
if (activeProps.fontVariationSettings) {
const matchedFont = localFonts.find(f => f.family === plugins.typography.fontFamily);
if (matchedFont && matchedFont.axes && matchedFont.axes.length > 0) {

Object.keys(activeAttrs).forEach(key => {

}

  ? (plugins.motionPath.autoRotateOffset !== 0 ? plugins.motionPath.autoRotateOffset : true)
  : false;

    ? parseInt(plugins.morph.shapeIndex, 10)

    ? `${plugins.drawSVG.start} ${plugins.drawSVG.end}`

vars._textExpr = { _isExpr: true, val: textVal, delimiter: delim };

  smoothChildTiming: true,

const _videoPlayEntries = [];

const vbTargetId = (t.viewBoxConfig._vbNodeId) ? t.viewBoxConfig._vbNodeId : rootSvgId;
const vbConfig = Object.assign({}, t.viewBoxConfig); delete vbConfig._vbNodeId;
const vbVars = { ...baseConfig, ...vbConfig };
if (t.type === 'set') { currentTl.set(`#${vbTargetId}`, vbConfig, cameraPos); }
else { if (t.type === 'from') vbVars.immediateRender = false; if (t.type === 'from') vbVars.lazy = false; currentTl[t.type](`#${vbTargetId}`, vbVars, cameraPos); }
}

// ── Video Play Parallel Tween ──────────────────────────────────────────────
// GSAP only schedules native play()/pause() calls at the right points in the
// timeline; the browser decodes/renders the video itself. (The previous
// approach tweened `currentTime` every frame, which works for one video but
// causes simultaneous decoders to deadlock — every video freezes — once more
// than one is active at the same time.)
if (t._videoPlayConfig) {
  const vpc = t._videoPlayConfig;
  const _vEl = document.getElementById(vpc.slotId);
  if (!_vEl || _vEl.tagName.toLowerCase() !== 'video') {
    // The slot this tween references no longer exists in the DOM — most likely
    // the video was replaced or the node was deleted after the tween was saved.
    console.warn(`[QweenApp] Video tween references slot "${vpc.slotId}" which is not in the DOM. Playback skipped.`);
    ElMessage.warning(`Video tween: slot "${vpc.slotId}" not found — re-select the video and re-save the tween.`);
  } else {
    const _vPos = elementsAnimated ? '<' : actualPos;
    // Clamp toTime to the video's actual duration so we never play past end
    const _actualMax = (_vEl.duration && isFinite(_vEl.duration)) ? _vEl.duration : Infinity;
    const _safeFrom = parseFloat(Math.max(0, vpc.fromTime).toFixed(3));
    const _safeTo   = parseFloat(Math.min(vpc.toTime, _actualMax).toFixed(3));
    // Round _vDur to 3dp to avoid floating-point subtraction drift
    const _vDur = parseFloat((_safeTo - _safeFrom).toFixed(3)) || baseConfig.duration || 1;

    // Prime the element to its start frame and mark it inactive until GSAP
    // reaches the play point.
    _vEl.pause();
    if (_vEl.readyState >= 1) {
      _vEl.currentTime = _safeFrom;
    }
    _vEl.dataset.qwVideoActive = '0';
    _vEl.dataset.qwVideoFrom = String(_safeFrom);
    _vEl.dataset.qwVideoTo = String(_safeTo);

    // Anchor both the play() and pause() calls to the same resolved position
    // via a label, so pause lands exactly _vDur seconds after play regardless
    // of whether _vPos is '<', '>', an absolute time, or a label.
    const _vLabel = `__vplay_${_videoPlayLabelCounter++}`;
    currentTl.addLabel(_vLabel, _vPos);

    // ── Clip-range looping via timeupdate ────────────────────────────────
    // When repeat ≠ 0, a timeupdate listener jumps currentTime back to
    // fromTime each time it reaches toTime, giving a clip-range loop.
    // repeat: -1 = infinite, repeat: N = N extra plays (so N+1 total).
    // The GSAP pause call is pushed out to cover all repeats so it doesn't
    // cut the video short before the loops finish.
    const _vRepeat = baseConfig.repeat; // 0 = once, -1 = infinite, N = N extra plays
    // Total GSAP window: for finite repeat, _vDur * (repeat+1); for infinite, _vDur (pause call is never the terminator anyway)
    const _vTotalDur = (_vRepeat > 0) ? parseFloat((_vDur * (_vRepeat + 1)).toFixed(3)) : _vDur;
    let _clipLoopListener = null;
    let _clipLoopCount = 0;
    if (_vRepeat !== 0) {
      _clipLoopListener = () => {
        if (_vEl.dataset.qwVideoActive !== '1') return;
        if (_vEl.currentTime >= _safeTo - 0.04) {
          if (_vRepeat === -1 || _clipLoopCount < _vRepeat) {
            _clipLoopCount++;
            _vEl.currentTime = _safeFrom;
            const p = _vEl.play();
            if (p && typeof p.catch === 'function') p.catch(() => {});
          }
        }
      };
    }

    // ── Play call ────────────────────────────────────────────────────────
    // In reverse mode the timeline plays backwards, but native <video> has
    // no reliable reverse decode — so we just play forward from fromTime as
    // normal. It won't be perfectly in sync with reversed SVG motion, but
    // it's far better than a frozen frame or a silent no-op.
    currentTl.call(() => {
      _clipLoopCount = 0;
      _vEl.currentTime = _safeFrom;
      _vEl.dataset.qwVideoActive = '1';
      _vEl.playbackRate = getEffectiveTimeScale(currentTl);
      if (_clipLoopListener) _vEl.addEventListener('timeupdate', _clipLoopListener);
      const p = _vEl.play();
      if (p && typeof p.catch === 'function') p.catch(() => {});
    }, null, _vLabel);

    currentTl.call(() => {
      if (_clipLoopListener) _vEl.removeEventListener('timeupdate', _clipLoopListener);
      _vEl.pause();
      _vEl.dataset.qwVideoActive = '0';
    }, null, `${_vLabel}+=${_vTotalDur}`);

    _videoPlayEntries.push({ el: _vEl, from: _safeFrom, to: _safeTo, tl: currentTl, loopListener: _clipLoopListener });
  }
}

};
tweens.forEach(t => processTweenNode(t, masterTl));

masterTl._videoPlayEntries = _videoPlayEntries;
return masterTl;
}
};

// ─────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────
const $status     = document.getElementById('status');
const $statusText = document.getElementById('status-text');
const $statusErr  = document.getElementById('status-error');
const $statusIcon = document.getElementById('status-icon');

function setStatus(msg) { $statusText.textContent = msg; }
function showError(msg) {
  $statusErr.textContent = '⚠ ' + msg;
  $statusErr.style.display = 'block';
  $statusIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f56c6c" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  $statusText.style.display = 'none';
}
function hideStatus() {
  $status.classList.add('hidden');
  setTimeout(() => { $status.style.display = 'none'; }, 450);
}

// ─────────────────────────────────────────────────────────────
// DOM builder — recreates nodes like QweenApp does
// ─────────────────────────────────────────────────────────────
function buildDom(project) {
  const frame = document.getElementById('frame');
  frame.innerHTML = '';

  const nodes = project.nodes || [];
  if (!nodes.length) throw new Error('Project has no nodes');

  // Use first node dimensions to set aspect ratio
  const n0 = nodes[0];
  const W = n0.width, H = n0.height;

  // Size the frame to fill the viewport while preserving aspect ratio
  sizeFrame(W, H);
  window.addEventListener('resize', () => sizeFrame(W, H));

  nodes.forEach((saved, ni) => {
    const nodeType = saved.type || 'svg';
    const nodeDiv = document.createElement('div');
    nodeDiv.id = saved.id;
    nodeDiv.className = 'qw-node';
    nodeDiv.style.zIndex = (ni + 2).toString();
    if (saved.visible === false) nodeDiv.style.display = 'none';

    if (nodeType === 'svg') {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'width:100%;height:100%;overflow:hidden;';
      wrapper.innerHTML = saved._svgContent || '';
      nodeDiv.appendChild(wrapper);
    } else if (nodeType === 'video') {
      const slots = saved._videoSlots && saved._videoSlots.length ? saved._videoSlots : [saved._videoContent];
      slots.forEach((slot, si) => {
        if (!slot) return;
        const vid = document.createElement('video');
        vid.id = slot._treeId || (saved.id.replace(/^node-/,'n') + '_video-' + (si+1));
        if (slot.src) vid.src = slot.src;
        if (slot.poster) vid.poster = slot.poster;
        vid.muted = true;
        vid.playsInline = true;
        vid.preload = 'auto';
        vid.style.zIndex = (si + 1).toString();
        nodeDiv.appendChild(vid);
      });
    } else if (nodeType === 'text') {
      const tc = saved._textContent || {};
      const textWrapper = document.createElement('div');
      textWrapper.id = saved.id + '_text';
      textWrapper.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;';
      textWrapper.innerHTML = tc.html || '';
      nodeDiv.appendChild(textWrapper);
    }

    frame.appendChild(nodeDiv);
  });

  // Ensure first SVG node gets root id for viewBox camera
  const firstSvgNode = nodes.find(n => !n.type || n.type === 'svg');
  if (firstSvgNode) {
    const nodeEl = document.getElementById(firstSvgNode.id);
    const svg = nodeEl ? nodeEl.querySelector('svg') : null;
    if (svg && !svg.id) svg.id = 'main-svg-root';
    if (svg && svg.id) return svg.id; // return rootSvgId
  }
  return 'main-svg-root';
}

function sizeFrame(W, H) {
  const frame = document.getElementById('frame');
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  const fw = W * scale, fh = H * scale;
  frame.style.width  = fw + 'px';
  frame.style.height = fh + 'px';
}

// ─────────────────────────────────────────────────────────────
// Preload images & warm up videos (verbatim logic from QweenApp)
// ─────────────────────────────────────────────────────────────
async function preloadAssets() {
  const urls = new Set();
  document.querySelectorAll('image').forEach(img => {
    const href = img.getAttribute('href') || img.getAttribute('xlink:href');
    if (href && !href.startsWith('data:')) urls.add(href);
  });
  const videoEls = Array.from(document.querySelectorAll('video'));
  const warmUp = v => new Promise(res => {
    if (!v.src) return res();
    if (v.readyState >= 3) return res();
    const done = () => { v.removeEventListener('canplaythrough', done); v.removeEventListener('error', done); res(); };
    v.addEventListener('canplaythrough', done, { once: true });
    v.addEventListener('error', done, { once: true });
    if (v.readyState === 0) v.load();
  });
  await Promise.all([
    ...[...urls].map(url => { const img = new Image(); img.src = url; return img.decode().catch(()=>{}); }),
    ...videoEls.map(v => warmUp(v)),
  ]);
}

// ─────────────────────────────────────────────────────────────
// Apply initial states (verbatim from QweenApp)
// ─────────────────────────────────────────────────────────────
function applyInitialStates(initialStates, rootSvgId) {
  if (!initialStates || !initialStates.length) return;
  initialStates.forEach(state => {
    if (state.targets && state.targets.length)
      gsap.set(state.targets.map(id => '#' + id), { ...state.vars, immediateRender: true });
    else if (state.isViewBox)
      gsap.set('#' + rootSvgId, { ...state.vars, immediateRender: true });
  });
}

// ─────────────────────────────────────────────────────────────
// Main: fetch → unzip → render
// ─────────────────────────────────────────────────────────────
async function run() {
  // Parse ?src= param
  const params = new URLSearchParams(location.search);
  const src = params.get('src');

  if (!src) {
    showError('No project URL provided.\nUsage: QweenRender.html?src=https://…/project.zip');
    return;
  }

  try {
    // ── 1. Fetch the zip ───────────────────────────────────
    setStatus('Fetching project…');
    const res = await fetch(src);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

    const buffer = await res.arrayBuffer();

    // ── 2. Unzip ───────────────────────────────────────────
    setStatus('Unpacking…');
    const zip = await JSZip.loadAsync(buffer);
    const jsonEntry = zip.file('project.json');
    if (!jsonEntry) throw new Error('Invalid project: missing project.json');
    const project = JSON.parse(await jsonEntry.async('string'));

    // Restore data sources stored as external files
    if (project.globalDataSources && project.globalDataSources.length) {
      project.globalDataSources = await Promise.all(project.globalDataSources.map(async src => {
        if (src._dataFile) {
          const fe = zip.file(`data/${src._dataFile}`);
          if (fe) {
            try {
              const text = await fe.async('string');
              const { _dataFile, ...rest } = src;
              return { ...rest, entries: JSON.parse(text) };
            } catch(e) { console.warn('Failed to load data file:', src.name, e); }
          }
        }
        return src;
      }));
    }

    // ── 2b. Restore video blobs from assets/ in the ZIP ──────────────────────
    // When QweenRender is driven by a project ZIP (either exported from QweenApp
    // or written by the API's render-project path), video blobs are embedded under
    // assets/<filename>.  Restore them as object URLs so <video src> works inside
    // the headless Playwright browser without needing an external asset server.
    for (const node of (project.nodes || [])) {
      if (node.type !== 'video') continue;
      const slots = (node._videoSlots && node._videoSlots.length)
        ? node._videoSlots
        : (node._videoContent ? [node._videoContent] : []);
      for (const slot of slots) {
        // Treat missing or stale blob:null/… URLs the same as absent src
        const _srcIsStale = !slot.src || slot.src.startsWith('blob:null');
        if (!slot || !_srcIsStale) continue;
        const assetFile = slot._assetFile || slot._label;
        if (!assetFile) continue;
        const entry = zip.file(`assets/${assetFile}`);
        if (!entry) continue;
        try {
          const ab = await entry.async('arraybuffer');
          slot.src = URL.createObjectURL(
            new Blob([ab], { type: slot.mimeType || 'video/mp4' })
          );
        } catch (e) {
          console.warn('[QweenRender] Failed to restore blob from ZIP assets/', assetFile, e);
        }
      }
      // Keep _videoSlots and _videoContent in sync
      if (!node._videoSlots) node._videoSlots = slots;
      node._videoContent = slots[0] || node._videoContent;
    }

    // ── 3. Build DOM ───────────────────────────────────────
    setStatus('Building scene…');
    const rootSvgId = buildDom(project);

    // ── 4. Set original viewBox ────────────────────────────
    const rootSvg = document.getElementById(rootSvgId);
    const originalViewBox = { x:0, y:0, w:100, h:100 };
    if (rootSvg) {
      const vb = rootSvg.getAttribute('viewBox');
      if (vb) {
        const parts = vb.split(/\s+|,/);
        Object.assign(originalViewBox, { x:parseFloat(parts[0]), y:parseFloat(parts[1]), w:parseFloat(parts[2]), h:parseFloat(parts[3]) });
      }
    }

    // ── 5. Apply initial states ────────────────────────────
    applyInitialStates(project.initialStates || [], rootSvgId);

    // ── 6. Preload ─────────────────────────────────────────
    setStatus('Preloading assets…');
    await preloadAssets();

    // ── 7. Hide overlay & play ─────────────────────────────
    hideStatus();

    // Set will-change hints
    const collectIds = (tweens) => {
      const ids = new Set();
      const c = t => { if(t.isGroup && t.children) t.children.forEach(c); else if(t.selectedElementIds) t.selectedElementIds.forEach(id => ids.add(id)); };
      tweens.forEach(c);
      return ids;
    };
    collectIds(project.tweens || []).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.willChange = 'transform, opacity';
    });

    // ── Playwright headless hooks ────────────────────────────────────────────
    window.__qween_ready       = false;
    window.__qween_frame_ready = false;
    window.__qween_master_tl   = null;

    // __qween_set_layer_mode(mode, zMin, zMax)
    // Used by the Python renderer for multi-pass video compositing.
    //
    // Earlier versions split nodes into two fixed buckets ("below the lowest
    // video" / "above the highest video"), which broke as soon as there was
    // more than one video node or a layer sandwiched between two videos —
    // that middle layer satisfied neither bucket and simply never rendered.
    //
    // This version works in terms of an explicit z-index band instead: only
    // nodes whose DOM zIndex falls strictly between zMin and zMax are shown.
    // The Python side derives zMin/zMax for every gap between (and around)
    // the stacked video nodes — see _run_playwright_render — so an arbitrary
    // number of videos, in any order, each get their own band on either side.
    //
    // mode:
    //   'normal' — all nodes visible, opaque black background (default)
    //   'band'   — only nodes with zMin < zIndex < zMax visible;
    //              body/html background set transparent for PNG alpha capture
    // zMin / zMax: pass null for an open-ended bound, e.g. zMin=null means
    //              "everything below zMax" (the lowest band has no floor).
    window.__qween_set_layer_mode = function(mode, zMin, zMax) {
      const nodeEls = Array.from(document.querySelectorAll('.qw-node'));

      if (mode === 'normal') {
        document.documentElement.style.background = '';
        document.body.style.background = '';
        nodeEls.forEach(el => { el.style.visibility = ''; });
      } else if (mode === 'band') {
        const lo = (zMin === null || zMin === undefined) ? -Infinity : zMin;
        const hi = (zMax === null || zMax === undefined) ? Infinity : zMax;
        document.documentElement.style.background = 'transparent';
        document.body.style.background = 'transparent';
        nodeEls.forEach(el => {
          const z = parseInt(el.style.zIndex, 10) || 0;
          el.style.visibility = (z > lo && z < hi) ? 'visible' : 'hidden';
        });
      }
    };

    window.__qween_seek = async function(t) {
      window.__qween_frame_ready = false;
      const masterTl = window.__qween_master_tl;
      if (masterTl) masterTl.pause(t);

      // The v222 AnimationEngine drives videos via native play()/pause() calls
      // anchored to timeline labels rather than tweening currentTime each frame.
      // When Playwright seeks to an arbitrary time t we must:
      //   1. Pause every video and clear the qwVideoActive flag so the GSAP
      //      call() callbacks don't fight us.
      //   2. Work out where each video's clip should be at time t by consulting
      //      the _videoPlayEntries registry the engine writes on buildTimeline.
      //   3. Seek each video to that position and wait for the seeked event.
      const entries = (masterTl && masterTl._videoPlayEntries) || [];
      const seen = new Set();

      const waits = entries.map(entry => {
        const v = entry.el;
        if (!v || seen.has(v)) return Promise.resolve();
        seen.add(v);

        // Clear active flag so timeupdate clip-loop listeners don't interfere
        v.dataset.qwVideoActive = '0';
        v.pause();

        if (v.readyState < 1 || isNaN(v.duration)) return Promise.resolve();

        // Determine which frame within the clip [from, to] to show at timeline time t.
        // If t is before the clip starts → show the first frame (fromTime).
        // If t is within the clip → show (fromTime + offset).
        // If t is after the clip ends → show the last frame (toTime).
        const clipFrom   = entry.from;
        const clipTo     = entry.to;
        const clipDur    = clipTo - clipFrom;

        // Find when this clip's GSAP call() fires by checking the timeline label.
        // As a practical proxy we use the clip's position in the master timeline:
        // masterTl.time() is already set to t above, so we look at where the
        // tween that owns this entry starts. If _videoPlayEntries carry no
        // explicit start-time we fall back to seeking to fromTime (first frame).
        let targetTime = clipFrom; // default: first frame
        if (clipDur > 0) {
          // Try to find the play label time so we can compute offset
          const labelTime = (() => {
            if (!masterTl || !masterTl.labels) return null;
            // Labels named __vplay_N were added by buildTimeline
            for (const [name, lTime] of Object.entries(masterTl.labels)) {
              if (!name.startsWith('__vplay_')) continue;
              // Check if this label's tween corresponds to our video element by
              // walking child tweens (expensive but only runs at seek time)
              const children = masterTl.getChildren(true, false, true);
              for (const child of children) {
                if (child._label === name && child.targets && child.targets().includes(v)) {
                  return lTime;
                }
              }
              // Simpler: if there's only one video active, any __vplay_ label is ours
              if (entries.length === 1) return lTime;
            }
            return null;
          })();

          if (labelTime !== null) {
            const offset = t - labelTime;
            if (offset < 0) {
              targetTime = clipFrom;           // before clip starts
            } else if (offset >= clipDur) {
              targetTime = clipTo - 0.001;     // past end, park on last frame
            } else {
              targetTime = clipFrom + (offset % clipDur); // within clip
            }
          }
        }

        const clamped = Math.min(Math.max(targetTime, 0), v.duration);
        if (Math.abs(v.currentTime - clamped) < 0.001) return Promise.resolve();
        v.currentTime = clamped;
        return new Promise(r => {
          const done = () => { v.removeEventListener('seeked', done); r(); };
          v.addEventListener('seeked', done, { once: true });
          setTimeout(done, 500); // safety fallback
        });
      });

      // Also handle any videos that are in the DOM but not in _videoPlayEntries
      // (e.g. nodes whose tween hasn't fired yet) — just pause them silently.
      Array.from(document.querySelectorAll('video')).forEach(v => {
        if (!seen.has(v)) { v.dataset.qwVideoActive = '0'; v.pause(); }
      });

      if (waits.length) await Promise.all(waits);

      // Two rAF passes to ensure browser has painted the new frame
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      window.__qween_frame_ready = true;
    };

    requestAnimationFrame(() => {
      const ctx = gsap.context(() => {});

      ctx.add(() => {
        // Re-apply initial states inside GSAP context
        applyInitialStates(project.initialStates || [], rootSvgId);

        const mm = gsap.matchMedia();
        mm.add({
          full:    '(prefers-reduced-motion: no-preference)',
          reduced: '(prefers-reduced-motion: reduce)',
        }, (mmCtx) => {
          const isReduced = !mmCtx.conditions.full;
          const tl = AnimationEngine.buildTimeline(
            project.tweens || [],
            !!project.timelineLoop,
            !!project.timelineYoyo,
            rootSvgId,
            {
              onComplete: () => {
                collectIds(project.tweens||[]).forEach(id => { const el=document.getElementById(id); if(el) el.style.willChange='auto'; });
              },
              onStart: () => {},
              onRepeat: () => {},
            },
            originalViewBox,
            !!project.timelineReverse,
            project.globalDataSources || [],
            project.swapTemplates || [],
            project.initialStates || [],
          );

          const speed = 1; // could expose via ?speed= param later
          if (isReduced) {
            tl.timeScale(speed).progress(1).pause();
          } else if (project.timelineReverse) {
            tl.timeScale(speed).totalProgress(1).reverse();
          } else {
            tl.timeScale(speed).play(0);
          }

          // Expose to Playwright
          window.__qween_master_tl = tl;
          window.__qween_ready     = true;
        });
      });
    });

  } catch (err) {
    console.error('[QweenRender]', err);
    showError(err.message || String(err));
  }
}

run();
</script>
</body>
